name: Release Charm Library

on:
  push:
    branches:
      - main
    paths:
      - "lib/charms/glauth_utils/**"

jobs:
  release-lib:
    name: Release any bumped library
    uses: canonical/identity-team/.github/workflows/charm-libs-release.yaml@b5070d98993fa72f429f4fdf8010f6f9a94eb4e0 # v1.14.2
    secrets:
      CHARMCRAFT_CREDENTIALS: ${{ secrets.CHARMCRAFT_CREDENTIALS }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
